<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background-color: #6a1b9a;
            background-image:
                linear-gradient(160deg, rgba(74, 20, 140, 0.95) 0%, rgba(106, 27, 154, 0.9) 40%, rgba(171, 71, 188, 0.85) 100%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.06) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.06) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.06) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.06) 75%);
            background-size: auto, 40px 40px, 40px 40px, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 20px, 20px -20px, -20px 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 60px 80px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            margin-bottom: 28px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-block;
            background: #ffffff;
            color: #6a1b9a;
            font-size: 1rem;
            font-weight: 600;
            padding: 13px 36px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="Matt%20pic.png" alt="Profile photo" class="avatar">
        <h1>Hello, World.</h1>
        <p>Welcome to my little corner of the internet.<br>Glad you stopped by!</p>
        <button class="btn">Contact Me</button>
    </div>
</body>
</html>
