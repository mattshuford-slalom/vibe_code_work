<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background-color: #6a1b9a;
            background-image:
                linear-gradient(160deg, rgba(74, 20, 140, 0.95) 0%, rgba(106, 27, 154, 0.9) 40%, rgba(171, 71, 188, 0.85) 100%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.06) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.06) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.06) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.06) 75%);
            background-size: auto, 40px 40px, 40px 40px, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 20px, 20px -20px, -20px 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 60px 80px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            margin-bottom: 28px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-block;
            background: #ffffff;
            color: #6a1b9a;
            font-size: 1rem;
            font-weight: 600;
            padding: 13px 36px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>
    <div class="card">
        <img src="Gemini_Generated_Image_svtsm7svtsm7svts.png" alt="Profile photo" class="avatar">
        <h1>Hello, World.</h1>
        <p>Welcome to my little corner of the internet.<br>Glad you stopped by!</p>
        <button class="btn">Contact Me</button>
    </div>

    <script>
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const colors = ['#ff4444','#ff9900','#ffee00','#44ff88','#44ccff','#cc44ff','#ff44cc','#ffffff'];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.radius = Math.random() * 3 + 1;
                this.decay = Math.random() * 0.02 + 0.012;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.08;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.particles = [];
                const count = 80 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, this.color));
                }
            }
            update() {
                this.particles = this.particles.filter(p => p.alpha > 0);
                this.particles.forEach(p => p.update());
            }
            draw() { this.particles.forEach(p => p.draw()); }
            isDead() { return this.particles.length === 0; }
        }

        let fireworks = [];
        let launched = 0;
        const positions = [0.1, 0.3, 0.5, 0.7, 0.9];

        function launchNext() {
            if (launched < 5) {
                const x = canvas.width * positions[launched];
                const y = canvas.height * (0.1 + Math.random() * 0.3);
                fireworks.push(new Firework(x, y));
                launched++;
                if (launched < 5) setTimeout(launchNext, 300);
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fireworks.forEach(f => { f.update(); f.draw(); });
            fireworks = fireworks.filter(f => !f.isDead());
            requestAnimationFrame(loop);
        }

        loop();
        launchNext();
    </script>
</body>
</html>
